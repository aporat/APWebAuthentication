name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Tests on iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set Project Scheme
        run: echo "scheme=$(basename ${{ github.repository }})" >> $GITHUB_ENV

      - name: Select iOS Simulator Destination
        run: |
          destination=$(python3 <<'EOF'
          import json, subprocess
          runtimes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]
          ios = [r for r in runtimes if r.get("isAvailable") and r["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]
          ios.sort(key=lambda r: [int(p) for p in r["version"].split(".")])
          rt = ios[-1]
          devices = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "-j"]))["devices"].get(rt["identifier"], [])
          iphones = [d for d in devices if d.get("isAvailable") and "iPhone" in d["name"]]
          name = iphones[-1]["name"] if iphones else "iPhone 16"
          print(f"platform=iOS Simulator,name={name},OS={rt['version']}")
          EOF
          )
          echo "Selected destination: $destination"
          echo "destination=$destination" >> "$GITHUB_ENV"

      - name: Run Tests with Code Coverage
        run: |
          set -o pipefail && \
          xcodebuild \
            -scheme "${{ env.scheme }}" \
            -destination "${{ env.destination }}" \
            -enableCodeCoverage YES \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./TestResults.xcresult \
            test

      - name: Install xcresultparser
        run: brew install xcresultparser

      - name: Generate Coverage Report
        run: |
          mkdir -p ./coverage
          xcresultparser \
            --output-format cobertura \
            ./TestResults.xcresult > ./coverage/cobertura.xml

      - name: Convert Test Results to JUnit
        run: |
          xcresultparser \
            --output-format junit \
            ./TestResults.xcresult > ./test-results.xml

      - name: Upload Code Coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: ./coverage/cobertura.xml

      - name: Upload Test Results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          slug: ${{ github.repository }}
          files: ./test-results.xml
